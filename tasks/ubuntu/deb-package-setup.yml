- name: Install .deb Packages
  become: true
  block:
    - name: Check installed version of {{ item.name }}
      command: "dpkg-query -W -f='${Version}' {{ item.name }}"
      register: package_check
      changed_when: false
      failed_when: false

    - name: Download {{ item.name }} .deb package
      get_url:
        url: "{{ item.url }}"
        dest: "/tmp/{{ item.name }}-{{ item.version }}-{{ item.arch }}.deb"
        mode: "0644"
      when: package_check.rc != 0 or (item.version != "latest" and item.version not in package_check.stdout)

    - name: Install {{ item.name }} .deb package
      apt:
        deb: "/tmp/{{ item.name }}-{{ item.version }}-{{ item.arch }}.deb"
        state: present
      when: package_check.rc != 0 or (item.version != "latest" and item.version not in package_check.stdout)

    - name: Clean up {{ item.name }} .deb package
      file:
        path: "/tmp/{{ item.name }}-{{ item.version }}-{{ item.arch }}.deb"
        state: absent
      when: package_check.rc != 0 or (item.version != "latest" and item.version not in package_check.stdout)
  tags: install
