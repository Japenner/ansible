---
user: jacob
github_account: Japenner

source_key: "./.ssh/id_ed25519"
dest_key: "/home/{{ user }}/.ssh/id_ed25519"
personal: "/home/{{ user }}/repos/personal"

apt_packages:
  core:
    - build-essential
    - cmake
    - pkg-config
    - libpthread-stubs0-dev
    - lua5.1
    - unzip
    - libtool
    - libtool-bin
    - gettext
    - picom
    - curl
    - htop
    - lsof
    - ccache
    - ninja-build
    - python3-pip
    - dconf-editor
    - moreutils
    - clangd
    - openssl
    - gnupg
    - libpq-dev
    - ca-certificates
    - stow
    - apt-transport-https
    - software-properties-common
  productivity:
    - tmux
    - wireshark
    - fzf
    - xclip
    - tldr
    - ripgrep
    - shutter
    - gh

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Languages managed by mise (https://mise.jdx.dev). Replaces asdf.
mise_global_tools:
  - ruby@latest
  - node@latest
  - python@latest
  - go@latest

zsh_plugins:
  - name: zsh-autosuggestions
    repo: "https://github.com/zsh-users/zsh-autosuggestions.git"
  - name: zsh-completions
    repo: "https://github.com/zsh-users/zsh-completions.git"
  - name: zsh-syntax-highlighting
    repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git"

project_repos:
  - anki
  - jacobs_toolbox
  - jp_com
  - obsidian
  - project_ideas
  - yt_dlp_wrapper

deb_packages:
  - name: rustdesk
    url: "https://github.com/rustdesk/rustdesk/releases/download/1.3.5/rustdesk-1.3.5-x86_64.deb"
    version: "1.3.5"
    arch: x86_64
  - name: discord
    url: "https://discord.com/api/download?platform=linux&format=deb"
    version: latest
    arch: amd64
  - name: obsidian
    url: "https://github.com/obsidianmd/obsidian-releases/releases/download/v1.7.7/obsidian_1.7.7_amd64.deb"
    version: "1.7.7"
    arch: amd64

# armored: true keys are ASCII-armored and must be dearmored before apt can use them.
repo_packages:
  - name: slack
    gpg_key_url: "https://packagecloud.io/slacktechnologies/slack/gpgkey"
    armored: true
    repo: "https://packagecloud.io/slacktechnologies/slack/debian/"
    build: jessie
    branch: main
  - name: signal-desktop
    gpg_key_url: "https://updates.signal.org/desktop/apt/keys.asc"
    armored: true
    repo: "https://updates.signal.org/desktop/apt"
    build: stable
    branch: main
  - name: brave-browser
    gpg_key_url: "https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg"
    armored: false
    repo: "https://brave-browser-apt-release.s3.brave.com/"
    build: stable
    branch: main
  - name: code
    gpg_key_url: "https://packages.microsoft.com/keys/microsoft.asc"
    armored: true
    repo: "https://packages.microsoft.com/repos/code"
    build: stable
    branch: main
