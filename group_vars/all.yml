---
user: jacob
github_account: Japenner

source_key: "./.ssh/id_ed25519"
dest_key: "/home/{{ user }}/.ssh/id_ed25519"
personal: "/home/{{ user }}/repos/personal"

apt_packages:
  core:
    - build-essential
    - unzip
    - curl
    - htop
    - lsof
    - ccache
    - python3-pip
    - python3-debian
    - dconf-editor
    - moreutils
    - openssl
    - gnupg
    - libpq-dev
    - ca-certificates
    - stow
    - apt-transport-https
    - software-properties-common
  productivity:
    - tmux
    - fzf
    - xclip
    - tldr
    - ripgrep
    - shutter
    - gh

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Languages managed by mise (https://mise.jdx.dev). Replaces asdf.
mise_global_tools:
  - ruby@latest
  - node@latest
  - python@latest
  - go@latest

project_repos:
  - anki
  - jacobs_toolbox
  - jp_com
  - obsidian
  - project_ideas
  - yt_dlp_wrapper

deb_packages:
  - name: rustdesk
    url: "https://github.com/rustdesk/rustdesk/releases/download/1.4.9/rustdesk-1.4.9-x86_64.deb"
    version: "1.4.9"
    arch: x86_64
  - name: discord
    url: "https://discord.com/api/download?platform=linux&format=deb"
    version: latest
    arch: amd64
  - name: obsidian
    url: "https://github.com/obsidianmd/obsidian-releases/releases/download/v1.12.7/obsidian_1.12.7_amd64.deb"
    version: "1.12.7"
    arch: amd64

# armored: true keys are ASCII-armored and must be dearmored before apt can use them.
repo_packages:
  - name: slack
    gpg_key_url: "https://packagecloud.io/slacktechnologies/slack/gpgkey"
    uris: "https://packagecloud.io/slacktechnologies/slack/debian/"
    suites: jessie
    components: main
  - name: signal-desktop
    gpg_key_url: "https://updates.signal.org/desktop/apt/keys.asc"
    uris: "https://updates.signal.org/desktop/apt"
    suites: xenial
    components: main
  - name: code
    gpg_key_url: "https://packages.microsoft.com/keys/microsoft.asc"
    uris: "https://packages.microsoft.com/repos/code"
    suites: stable
    components: main
  - name: google-chrome-stable
    gpg_key_url: "https://dl.google.com/linux/linux_signing_key.pub"
    uris: "https://dl.google.com/linux/chrome/deb/"
    suites: stable
    components: main
