---
- name: Ensure .ssh directory exists
  become: true
  ansible.builtin.file:
    dest: "{{ dest_key | dirname }}"
    mode: "0700"
    owner: "{{ user }}"
    group: "{{ user }}"
    state: directory
  tags: ssh

- name: Copy SSH keys
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ dest_key if 'pub' not in item else dest_key + '.pub' }}"
    mode: "{{ '0600' if 'pub' not in item else '0644' }}"
    owner: "{{ user }}"
    group: "{{ user }}"
  loop:
    - "{{ source_key }}"
    - "{{ source_key }}.pub"
  tags: ssh

- name: Set authorized key from file
  become: true
  ansible.posix.authorized_key:
    user: "{{ user }}"
    state: present
    key: "{{ lookup('file', '/home/' + user + '/.ssh/id_ed25519.pub') }}"
  tags: ssh

- name: Add GitHub to known hosts
  become: true
  become_user: "{{ user }}"
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com') }}"
    path: "/home/{{ user }}/.ssh/known_hosts"
    state: present
  tags: ssh
