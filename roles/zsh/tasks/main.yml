---
- name: Install ZSH and Oh-My-Zsh
  tags: zsh
  block:
    - name: Install ZSH
      become: true
      ansible.builtin.apt:
        name: zsh
        state: present

    - name: Set ZSH as the default shell
      become: true
      ansible.builtin.user:
        name: "{{ user }}"
        shell: /usr/bin/zsh

    - name: Install Oh-My-Zsh if missing
      ansible.builtin.shell: |
        if [ ! -d /home/{{ user }}/.oh-my-zsh ]; then
          RUNZSH=no CHSH=no sh -c "$(curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh)";
        fi
      args:
        creates: "/home/{{ user }}/.oh-my-zsh"

- name: Check for an existing .zshrc
  ansible.builtin.stat:
    path: "/home/{{ user }}/.zshrc"
  register: zshrc_stat
  tags: zsh

- name: Remove Oh-My-Zsh-generated .zshrc so the dotfiles role can symlink its own
  # Oh-My-Zsh's installer scaffolds a real ~/.zshrc on first install; GNU Stow
  # refuses to overwrite a non-symlink target, so this would otherwise silently
  # block the dotfiles role's `stow -R zsh` from ever linking in its own .zshrc.
  ansible.builtin.file:
    path: "/home/{{ user }}/.zshrc"
    state: absent
  when: zshrc_stat.stat.exists and not zshrc_stat.stat.islnk
  tags: zsh
