---
- name: Install ZSH and Oh-My-Zsh
  block:
    - name: Install ZSH
      become: true
      ansible.builtin.apt:
        name: zsh
        state: present

    - name: Set ZSH as the default shell
      become: true
      ansible.builtin.user:
        name: "{{ user }}"
        shell: /usr/bin/zsh

    - name: Install Oh-My-Zsh if missing
      ansible.builtin.shell: |
        if [ ! -d /home/{{ user }}/.oh-my-zsh ]; then
          sh -c "$(curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh)";
        fi
      args:
        creates: "/home/{{ user }}/.oh-my-zsh"
  tags: zsh

- name: Clone ZSH plugins
  become: true
  become_user: "{{ user }}"
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "/home/{{ user }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
    version: master
  loop: "{{ zsh_plugins }}"
  tags: zsh

- name: Clone ZSH themes
  become: true
  become_user: "{{ user }}"
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "/home/{{ user }}/.oh-my-zsh/custom/themes/{{ item.name }}"
    version: master
  loop: "{{ zsh_themes }}"
  tags: zsh
