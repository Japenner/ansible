---
- name: Remove conflicting Docker packages
  become: true
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent
  tags: docker

- name: Set up Docker repository and install
  become: true
  tags: docker
  block:
    - name: Create directory for Docker GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /tmp/docker-key.asc
        mode: "0644"

    - name: Dearmor Docker GPG key
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker-key.asc
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker APT source list
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        update_cache: true
        state: present

- name: Ensure Docker service is running and user is added
  become: true
  tags: docker
  block:
    - name: Start and enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add user to the docker group
      ansible.builtin.user:
        name: "{{ user }}"
        groups: docker
        append: true

- name: Determine dpkg architecture
  become: true
  ansible.builtin.command:
    cmd: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false
  tags: lazydocker

- name: Download Lazydocker
  become: true
  vars:
    lazydocker_arch_map:
      amd64: x86_64
      arm64: arm64
  ansible.builtin.get_url:
    url: "https://github.com/jesseduffield/lazydocker/releases/download/v0.23.3/lazydocker_0.23.3_Linux_{{ lazydocker_arch_map[dpkg_arch.stdout] }}.tar.gz"
    dest: /tmp/lazydocker.tar.gz
    mode: "0644"
  register: lazydocker_download
  tags: lazydocker

- name: Extract and install Lazydocker
  become: true
  ansible.builtin.unarchive:
    src: /tmp/lazydocker.tar.gz
    dest: /usr/local/bin/
    remote_src: true
  args:
    creates: /usr/local/bin/lazydocker
  when: lazydocker_download.changed
  tags: lazydocker
