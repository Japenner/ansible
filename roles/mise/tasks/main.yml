---
- name: Install mise version manager
  become: true
  tags:
    - asdf
    - mise
  block:
    - name: Determine dpkg architecture
      ansible.builtin.command:
        cmd: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Add mise apt repository
      ansible.builtin.deb822_repository:
        name: mise
        types: deb
        uris: https://mise.jdx.dev/deb
        suites: stable
        components: main
        architectures: "{{ dpkg_arch.stdout }}"
        signed_by: https://mise.jdx.dev/gpg-key.pub

    - name: Install mise
      ansible.builtin.apt:
        name: mise
        state: present
        update_cache: true

- name: Use precompiled Ruby binaries instead of building from source
  become: true
  become_user: "{{ user }}"
  ansible.builtin.command:
    cmd: mise settings ruby.compile=false
  changed_when: true
  tags:
    - asdf
    - mise

- name: Install and set global language versions with mise
  become: true
  become_user: "{{ user }}"
  ansible.builtin.command:
    cmd: "mise use --global {{ item }}"
  register: mise_use
  changed_when: "'install' in (mise_use.stdout ~ mise_use.stderr) | lower"
  loop: "{{ mise_global_tools }}"
  tags:
    - asdf
    - mise
