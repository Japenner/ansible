---
- name: Install mise version manager
  become: true
  block:
    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add mise GPG key
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://mise.jdx.dev/gpg-key.pub
          | gpg --dearmor -o /etc/apt/keyrings/mise-archive-keyring.gpg
        creates: /etc/apt/keyrings/mise-archive-keyring.gpg

    - name: Add mise apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.gpg arch=amd64] https://mise.jdx.dev/deb stable main"
        filename: mise
        state: present
        update_cache: true

    - name: Install mise
      ansible.builtin.apt:
        name: mise
        state: present
  tags:
    - asdf
    - mise

- name: Install and set global language versions with mise
  become: true
  become_user: "{{ user }}"
  ansible.builtin.command:
    cmd: "mise use --global {{ item }}"
  register: mise_use
  changed_when: "'install' in (mise_use.stdout ~ mise_use.stderr) | lower"
  loop: "{{ mise_global_tools }}"
  tags:
    - asdf
    - mise
