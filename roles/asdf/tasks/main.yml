---
- name: Clone ASDF and configure
  become: true
  become_user: "{{ user }}"
  ansible.builtin.git:
    repo: "https://github.com/asdf-vm/asdf.git"
    dest: "/home/{{ user }}/.asdf"
    depth: 1
    version: v0.14.1
  tags: asdf

- name: Add ASDF plugins
  become: true
  become_user: "{{ user }}"
  ansible.builtin.shell: |
    . /home/{{ user }}/.asdf/asdf.sh && asdf plugin-add {{ item.name }} {{ item.repo }}
  args:
    creates: "/home/{{ user }}/.asdf/plugins/{{ item.name }}"
  loop:
    - { name: ruby, repo: "https://github.com/asdf-vm/asdf-ruby.git" }
    - { name: nodejs, repo: "https://github.com/asdf-vm/asdf-nodejs.git" }
    - { name: python, repo: "https://github.com/asdf-vm/asdf-python.git" }
    - { name: golang, repo: "https://github.com/asdf-community/asdf-golang.git" }
  tags: asdf

- name: Install and set global versions with ASDF
  become: true
  become_user: "{{ user }}"
  ansible.builtin.shell: |
    . /home/{{ user }}/.asdf/asdf.sh
    asdf list {{ item }} 2>/dev/null | grep -q . || asdf install {{ item }} latest
    asdf global {{ item }} latest
  changed_when: true
  loop:
    - ruby
    - nodejs
    - python
    - golang
  tags: asdf
