---
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install ansible ansible-lint yamllint

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

      - name: Syntax check
        run: ansible-playbook --syntax-check ubuntu.yml
